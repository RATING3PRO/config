// ============================================================================
// 基础服务器设置
// ============================================================================
hostname "CS2 LAN Server"          // 服务器名称
rcon_password "lanpass"            // RCON 远程管理密码
sv_password ""                    // 服务器连接密码（留空为公开）
sv_lan 1                          // 局域网模式（1=开启，0=关闭）
sv_region 4                       // 服务器区域（4 为亚洲）

// ============================================================================
// BOT 数量与平衡 (10个 BOT, 5v5 竞技模式)
// ============================================================================
bot_quota 10                      // 强制维持 10 个 BOT
bot_quota_mode fill               // 玩家加入后自动踢出 BOT 填充
bot_join_after_player 0           // 无需玩家加入，BOT 也会自动进场
bot_difficulty 2                  // BOT 难度 (0-3)
mp_autoteambalance 1              // 开启自动队伍平衡
mp_limitteams 1                   // 队伍间人数差最大为 1

// ============================================================================
// 竞技模式规则 (MR12)
// ============================================================================
game_type 0                       // 游戏类型：经典
game_mode 1                       // 游戏模式：竞技
mp_maxrounds 24                   // 最大回合数 24 (MR12)
mp_halftime 1                     // 开启中场换边
mp_freezetime 15                  // 每局开始冻结时间 15 秒
mp_buytime 20                     // 购买物资时间 20 秒
mp_startmoney 800                 // 初始金钱 800
mp_roundtime 1.92                 // 竞技模式单局时长
mp_friendlyfire 1                 // 开启队友伤害
mp_autokick 0                     // 自动踢出挂机或杀队友的人 (0 为关闭)

// ============================================================================
// 性能与网络优化
// ============================================================================
sv_hibernate_when_empty 1         // 服务器无人时自动进入休眠状态
sv_minrate 196608                 // 最小带宽
sv_maxrate 0                      // 最大带宽 (0 为不限制)
sv_clockcorrection_msecs 15       // 时钟修正
sv_parallel_sendsnapshot 1        // 开启并行快照发送以提升性能

// ============================================================================
// 日志记录
// ============================================================================
log on                            // 开启日志记录
sv_logbans 1                      // 记录封禁日志
sv_logecho 1                      // 在控制台回显日志内容

// 写入配置
writeid
writeip
host_writeconfig