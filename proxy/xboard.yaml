  - {name: Microsoft, type: select, proxies: [直连,所有-手动,所有-自动,香港-自动,日本-自动,新加坡-自动,美国-自动,拒绝]}
  - {name: Google, type: select, proxies: [直连,所有-手动,所有-自动,香港-自动,日本-自动,新加坡-自动,美国-自动,拒绝]}
  - {name: Discord, type: select, proxies: [直连,所有-手动,所有-自动,香港-自动,日本-自动,新加坡-自动,美国-自动,拒绝]}
  - {name: Test, type: select, proxies: [直连,所有-手动,所有-自动,香港-自动,日本-自动,新加坡-自动,美国-自动,拒绝]}
  - {name: 国外, type: select, proxies: [直连,所有-手动,所有-自动,香港-自动,日本-自动,新加坡-自动,美国-自动,拒绝]}
  - {name: 国内, type: select, proxies: [直连,所有-手动,所有-自动,香港-自动,日本-自动,新加坡-自动,美国-自动,拒绝]}
  - {name: 其他, type: select, proxies: [直连,所有-手动,所有-自动,香港-自动,日本-自动,新加坡-自动,美国-自动,拒绝]}
  - {name: 所有-手动, type: select, proxies: [/^((?!(直连|拒绝)).)*$/]}
  - {name: 所有-自动, type: url-test, tolerance: 50, interval: 300, proxies: [/^((?!(直连|拒绝)).)*$/]}
  - {name: 香港-自动, type: url-test, tolerance: 50, interval: 300, proxies: [/(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$/]}
  - {name: 日本-自动, type: url-test, tolerance: 50, interval: 300, proxies: [/(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$/]}
  - {name: 新加坡-自动, type: url-test, tolerance: 50, interval: 300, proxies: [/(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$/]}
  - {name: 美国-自动, type: url-test, tolerance: 50, interval: 300, proxies: [/(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$/]}

